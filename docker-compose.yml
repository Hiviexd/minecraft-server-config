services:
    minecraft:
        image: itzg/minecraft-server
        container_name: minecraft
        ports:
            - "25565:25565"
        environment:
            EULA: "TRUE"
            TYPE: "PAPER"
            VERSION: "1.21.8"
            MOTD: "Adouma Mibouna"
            MEMORY: "4G"
            ONLINE_MODE: "FALSE"
            VIEW_DISTANCE: "8"
            SIMULATION_DISTANCE: "6"
            SEED: "888880777356331877"

            ENABLE_AUTOPAUSE: "TRUE"
            AUTOPAUSE_TIMEOUT_EST: "300"
            AUTOPAUSE_TIMEOUT_INIT: "600"
            AUTOPAUSE_PERIOD: "10"

            OPS: "Hivie_"

        volumes:
            - ./data:/data
        restart: unless-stopped
